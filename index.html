<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizzaria Bom Paladar</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#111111',
                        cardBg: '#1a1a1a',
                        cardHover: '#222222',
                        brandRed: '#e50914'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-[#111111] text-gray-100 font-sans antialiased selection:bg-red-600 selection:text-white">

    <div id="root"></div>

            { id: 5, name: 'Bacon', ingredients: 'Molho, mussarela, bacon, tomate, cebola e orégano.', price: 35.00 },
            { id: 6, name: 'Baiana', ingredients: 'Molho, mussarela, calabresa, pimenta calabresa, ovo, tomate, cebola e orégano.', price: 35.00 },
            { id: 7, name: '4 Queijos', ingredients: 'Molho, parmesão, mussarela, catupiry, cheddar, tomate e orégano.', price: 35.00 },

            { id: 9, name: 'Mista', ingredients: 'Molho, mussarela, presunto, ervilha, milho verde, tomate, cebola e orégano.', price: 35.00 },

        const bebidas = [
            { id: 13, name: 'Guaraná Antarctica 1L', price: 7.00 },
            { id: 14, name: 'Guaraná Antarctica 2L', price: 10.00 },
            { id: 15, name: 'Pepsi 1L', price: 7.00 },
            { id: 16, name: 'Pepsi 2L', price: 10.00 },

            const instagramLink = "https://www.instagram.com/pizzaria.bom.paladar.j.m?igsh=N2lubGphbngybG9h";

            const handleOrder = (itemName, itemPrice) => {
                const message = `Olá, Bom Paladar! Gostaria de pedir: *${itemName}* (R$ ${itemPrice.toFixed(2).replace('.', ',')}). Podemos continuar com o pedido?`;

                window.open(url, '_blank');
            };

                    <header className="flex items-center justify-between p-6 max-w-7xl w-full mx-auto">

                        </nav>

                            <p className="text-gray-400 text-base md:text-lg mb-8 max-w-md mx-auto md:mx-0">

                            <a href="#cardapio" className="inline-block bg-red-600 hover:bg-red-700 text-white font-bold py-4 px-10 rounded-full transition-transform transform hover:scale-105 shadow-lg shadow-red-600/30">

                            />
                        </div>
                    </section>

                    {/* CATEGORIAS & SELEÇÃO */}
                    <div className="max-w-7xl w-full mx-auto px-6 py-8" id="cardapio">
                        <div className="flex flex-wrap gap-3 mb-10 border-b border-gray-800 pb-6 overflow-x-auto whitespace-nowrap">

                        </div>

                                <div key={pizza.id} className="bg-[#161616] border border-gray-900 rounded-[2rem] p-6 flex flex-col items-center text-center hover:border-red-600/30 hover:bg-[#1c1c1c] transition-all duration-300 group">
                                    <div className="overflow-hidden rounded-full mb-5 w-36 h-36 border-4 border-gray-900 group-hover:border-red-600/20 transition-all duration-300">
                                        <img 
                                            src="https://images.unsplash.com/photo-1513104890138-7c749659a591?q=80&w=250&auto=format&fit=crop" 
                                            alt={pizza.name} 
                                            className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500"
                                        />
                                    </div>
                                    <h3 className="text-xl font-extrabold text-white mb-2 tracking-tight">{pizza.name}</h3>
                                    <p className="text-gray-400 text-xs line-clamp-3 mb-6 flex-grow leading-relaxed">
                                        {pizza.ingredients}
                                    </p>
                                    <div className="w-full flex items-center justify-center mb-4">
                                        <span className="text-white font-black text-xl">
                                            R$ {pizza.price.toFixed(2).replace('.', ',')}
                                        </span>
                                    </div>
                                    <button 
                                        onClick={() => handleOrder(pizza.name, pizza.price)}
                                        className="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3.5 rounded-xl transition-colors text-sm tracking-wider uppercase"
                                    >
                                        Comprar
                                    </button>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* SEÇÃO DE BEBIDAS */}
                    <div className="max-w-7xl w-full mx-auto px-6 py-12" id="bebidas">
                        <h2 className="text-2xl font-black text-white mb-6 border-l-4 border-red-600 leagues pl-3 uppercase tracking-wider">Bebidas</h2>
                        <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4">
                            {bebidas.map((bebida) => (
                                <div key={bebida.id} className="bg-[#161616] border border-gray-900 rounded-2xl p-5 flex items-center justify-between hover:border-gray-800 transition-colors">
                                    <div>
                                        <h3 className="text-white font-bold text-sm mb-1">{bebida.name}</h3>
                                        <span className="text-red-500 font-extrabold text-sm">R$ {bebida.price.toFixed(2).replace('.', ',')}</span>
                                    </div>
                                    <button 
                                        onClick={() => handleOrder(bebida.name, bebida.price)}
                                        className="bg-[#222] hover:bg-red-600 text-white p-3 rounded-xl transition-colors"
                                    >

                    <footer className="bg-[#0a0a0a] border-t border-gray-900 mt-20 pt-12 pb-6" id="contato">
                        <div className="max-w-7xl mx-auto px-6 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-8 text-sm">
                            <div className="space-y-3">
                                <h3 className="text-xl font-black text-white uppercase">Bom Paladar</h3>
                                <p className="text-gray-500 max-w-xs leading-relaxed">
                                    A união perfeita entre a tradição de uma boa massa e a facilidade do pedido online direto para a sua mesa.
                                </p>
                            </div>
                            <div className="space-y-3">
                                <h4 className="text-white font-bold uppercase tracking-wider text-xs text-gray-400">Informações</h4>
                                <p className="text-gray-400 flex items-center gap-2">
                                    <span className="text-red-600">📍</span> Matriz de Camaragibe - AL
                                </p>
                                <p className="text-gray-400 flex items-center gap-2">
                                    <span className="text-red-600">🛵</span> Atendimento Rápido 24/7
                                </p>
                            </div>
                            <div className="space-y-3">
                                <h4 className="text-white font-bold uppercase tracking-wider text-xs text-gray-400">Contatos rápidos</h4>
                                <a href={`https://wa.me/${whatsappNumber}`} target="_blank" className="block text-gray-400 hover:text-green-400 transition-colors">
                                    📞 (82) 99403-3796
                                </a>
                                <a href={instagramLink} target="_blank" className="block text-gray-400 hover:text-pink-400 transition-colors">
                                    📸 @pizzaria.bom.paladar.j.m
                                </a>
                            </div>
                        </div>
                        <div className="max-w-7xl mx-auto px-6 mt-12 pt-6 border-t border-gray-900 text-center text-xs text-gray-600">
                            &copy; {new Date().getFullYear()} Pizzaria Bom Paladar. Todos os direitos reservados.
                        </div>
                    </footer>

                </div>
            );
        }

        // Renderiza o componente principal na div root
        const root = ReactRoot = injustices = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
